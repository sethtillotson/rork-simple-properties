apiVersion: apps/v1
kind: Deployment
metadata:
  name: rork-gateway
  namespace: default
  labels:
    app: rork-gateway
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: rork-gateway
  template:
    metadata:
      labels:
        app: rork-gateway
    spec:
      containers:
        - name: gateway
          image: ttl.sh/rork-gateway-1756796153:24h
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
              hostPort: 8082
          env:
            - name: OLLAMA_URL
              value: "http://192.168.0.188:11434"
            - name: LLM_MODEL
              value: "llama3.2:1b-instruct-q4_K_M"
            - name: DEMO_MODE
              value: "false"
      nodeSelector:
        kubernetes.io/hostname: master
      tolerations:
        - key: "node-role.kubernetes.io/master"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
---
apiVersion: v1
kind: Service
metadata:
  name: rork-gateway
  namespace: default
  labels:
    app: rork-gateway
spec:
  selector:
    app: rork-gateway
  ports:
    - name: http
      port: 8082
      targetPort: 8082
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rork-gateway
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rork-gateway
                port:
                  number: 8082

